<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão da Copa</title>
    <style>
        /* Menu - IGUAL AO SEU */
        ul {
            list-style-type: none;
            margin: 0;
            background-color: #1f4f0c;
            padding: 0;
            display: flex;
        }
        ul li a {
            display: block;
            color: white;
            padding: 14px 16px;
            text-decoration: none;
        }
        ul li a:hover {
            background-color: #0f2b06;
        }
        
        /* Tabela */
        body {
            margin: 0;
            font-family: 'Trebuchet MS', sans-serif;
        }
        header {
            background-color: #1f4f0c;
            color: white;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        h2 {
            text-align: center;
            color: #1f4f0c;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: white;
        }
        th {
            background-color: #1f4f0c;
            color: white;
            padding: 12px;
            border: 1px solid #1f4f0c;
            text-align: center;
        }
        td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }
        td:first-child, td:nth-child(2) {
            font-weight: bold;
        }
        td:nth-child(4), td:nth-child(6) {
            font-weight: bold;
            font-size: 1.1em;
        }
        td:nth-child(5) {
            color: #1f4f0c;
            font-weight: bold;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        #loading, #error {
            text-align: center;
            padding: 40px;
        }
        #error {
            color: red;
        }
    </style>
</head>
<body>
    <header>
        <h1>Bolão da Copa do Mundo 2026</h1>
    </header>
    
    <nav>
        <ul>
            <li><a href="/inicio.html">Início</a></li>
            <li><a href="/classificacao.html">Classificação</a></li>
            <li><a href="/historico.html">Histórico</a></li>
            <li><a href="/participantes.html">Participantes</a></li>
        </ul>
    </nav>

    <div class="container">
        <h2>Próximos jogos</h2>
        
        <div id="loading">Carregando jogos...</div>
        <div id="error" style="display: none;"></div>
        
        <table id="tabela" style="display: none;">
            <thead>
                <tr>
                    <th>Dia</th>
                    <th>Hora</th>
                    <th>Time</th>
                    <th>Gols</th>
                    <th></th>
                    <th>Gols</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="corpo-tabela"></tbody>
        </table>
    </div>

    <script>
        function carregarJogos() {
            fetch('jogos.json')
                .then(res => res.json())
                .then(jogos => {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('tabela').style.display = 'table';
                    
                    const tbody = document.getElementById('corpo-tabela');
                    tbody.innerHTML = '';
                    
                    jogos.forEach(jogo => {
                        tbody.innerHTML += `
                            <tr>
                                <td>${jogo.dia}</td>
                                <td>${jogo.hora}</td>
                                <td>${jogo.time_casa}</td>
                                <td>${jogo.gols_casa}</td>
                                <td>x</td>
                                <td>${jogo.gols_fora}</td>
                                <td>${jogo.time_fora}</td>
                            </tr>
                        `;
                    });
                })
                .catch(erro => {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('error').style.display = 'block';
                    document.getElementById('error').innerHTML = '❌ Erro: execute o Python primeiro para gerar o arquivo jogos.json';
                });
        }
        
        window.onload = carregarJogos;
    </script>
</body>
</html>
